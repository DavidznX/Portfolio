<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
        <link rel="stylesheet" href="./styles/style.css">
    <title>Meus Projetos</title>
</head>
<body>
          <section class="section_title"><h1>SITE EM DESENVOLVIMENTO</h1></section>
    <header class="cabecalho">

        <div class="div_img_cabecalho">
            <img src="./img/logodavid.png" alt="">
        </div>


        <div class="div_lista_links_cabecalho">
            <ul>
                <li><a href="index.htm">APRESENTAÇÃO</a></li>
                <li><a href="portfolio.htm">PORTFOLIO</a></li>
                <li><a href="redes.htm">REDES</a></li>
            </ul>
        </div>
    </header>


    <div class="portfolio">

        <div class="master_galeria">
            <div class="title_galeria_de_jogos">
                <h1>Galeria de Jogos</h1>
            </div>

            <div class="div_projetos_master"></div>

            <div class="button_ver_mais">
                <button>Ver mais</button>
            </div>
        </div>

        <div class="master_modelagen">
            <div class="title_galeria_de_jogos">
                <h1>Modelagens 3D</h1>
            </div>

            <div class="div_projetos_master"></div>

            <div class="button_ver_mais">
                <button>Ver mais</button>
            </div>
        </div>

        <div class="master_projetos">
            <div class="title_galeria_de_jogos">
                <h1>Projetos Gerais</h1>
            </div>

            <div class="div_projetos_master"></div>

            <div class="button_ver_mais">
                <button>Ver mais</button>
            </div>
        </div>

    </div>

   <script>
async function carregarProjetos() {
    try {
        const resposta = await fetch("./projetos.json");
        const dados = await resposta.json();
        const projetos = dados.projetos;

        configurarSecao("jogos", 3, ".master_galeria");
        configurarSecao("modelagem", 6, ".master_modelagen");
        configurarSecao("geral", 3, ".master_projetos");

        function configurarSecao(categoria, quantidadeInicial, seletor) {

            const container = document.querySelector(seletor + " .div_projetos_master");
            const botao = document.querySelector(seletor + " .button_ver_mais button");

            const filtrados = projetos.filter(p => p.categoria === categoria);

            let quantidadeAtual = quantidadeInicial;

            function renderizar() {
                container.innerHTML = "";

                filtrados.slice(0, quantidadeAtual).forEach(projeto => {

                    const card = document.createElement("div");
                    card.classList.add("card_projeto");

                    card.innerHTML = `
                        <img src="${projeto.thumb}" alt="${projeto.titulo}">
                        <p>${projeto.titulo}</p>
                    `;

                    card.addEventListener("click", () => {
                        window.location.href = "projeto.htm?id=" + projeto.id;
                    });

                    container.appendChild(card);
                });

                // Se acabou os projetos, esconde o botão
                if (quantidadeAtual >= filtrados.length) {
                    botao.style.display = "none";
                }
            }

            botao.addEventListener("click", () => {
                quantidadeAtual += quantidadeInicial;
                renderizar();
            });

            renderizar();
        }

    } catch (erro) {
        console.error("Erro ao carregar projetos:", erro);
    }
}

carregarProjetos();
</script>

</html>
